services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: agent-harness-falkordb
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # localhost only — not externally exposed
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  falkordb_data:
    driver: local
